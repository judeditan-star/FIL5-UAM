<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filipino 5 - Comic Assessment Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'comic-yellow': '#FDF6E3',
                        'comic-turquoise': '#065F46',
                        'comic-teal': '#0D9488',
                        'comic-border': '#022C22',
                    },
                    fontFamily: {
                        'comic': ['Luckiest Guy', 'cursive'],
                        'action': ['Bangers', 'cursive'],
                        'sans': ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FDF6E3;
            background-image: radial-gradient(#065F46 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .comic-card {
            background: white;
            border: 4px solid #022C22;
            box-shadow: 8px 8px 0px #022C22;
            transition: all 0.1s ease-in-out;
        }

        .comic-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 12px 12px 0px #0D9488;
        }

        .comic-card.active {
            background: #065F46;
            color: white !important;
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0px #022C22;
        }

        .comic-title {
            text-shadow: 3px 3px 0px #022C22;
            -webkit-text-stroke: 1px #022C22;
        }

        .speech-bubble {
            position: relative;
            background: #ffffff;
            border: 3px solid #022C22;
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 0;
            height: 0;
            border: 15px solid transparent;
            border-top-color: #022C22;
            border-bottom: 0;
            border-left: 0;
            margin-left: -7.5px;
            margin-bottom: -15px;
        }

        .panel-container {
            border: 6px solid #022C22;
            box-shadow: 15px 15px 0px rgba(6, 95, 70, 0.4);
            background: #fff;
        }

        .zigzag-border {
            clip-path: polygon(0% 0%, 100% 0%, 100% 95%, 95% 100%, 5% 100%, 0% 95%);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        
        <!-- Comic Header -->
        <header class="relative mb-12 transform -rotate-1">
            <div class="bg-comic-turquoise border-4 border-comic-border p-6 md:p-10 inline-block zigzag-border">
                <div class="flex flex-col md:flex-row items-center gap-6">
                    <div class="bg-yellow-400 border-4 border-comic-border p-4 shadow-[5px_5px_0px_#022C22] transform rotate-3">
                        <span class="font-action text-3xl md:text-5xl text-comic-border tracking-wider italic">BAITANG 5</span>
                    </div>
                    <div>
                        <h1 class="comic-title font-comic text-5xl md:text-7xl text-white tracking-widest uppercase">FILIPINO MATRIX</h1>
                        <p class="font-action text-xl text-yellow-300 tracking-widest mt-2 uppercase">Ikalawang Termino: Akademikong Pagtataya</p>
                    </div>
                </div>
            </div>
            <div class="absolute -top-10 -right-10 opacity-20 -z-10">
                <i class="fa-solid fa-burst text-[15rem] text-comic-turquoise"></i>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Sidebar -->
            <div class="lg:col-span-4 space-y-6">
                <div class="speech-bubble p-4 mb-4 rounded-xl font-bold text-comic-border italic">
                    "Piliin ang iyong misyon sa ibaba!"
                </div>

                <div class="space-y-4">
                    <button onclick="changeView('gp1', 'GAWAING PASULAT 1', 'https://drive.google.com/file/d/152r3OxKtVJA1PQpnvIheUR6NIRiEBmUm/preview')" 
                            id="btn-gp1" class="comic-card w-full flex items-center gap-4 p-4 rounded-lg group">
                        <div class="w-12 h-12 bg-yellow-400 border-2 border-comic-border flex items-center justify-center text-2xl transform -rotate-6 group-hover:rotate-12 transition-transform">
                            <i class="fa-solid fa-pen-nib text-comic-border"></i>
                        </div>
                        <span class="font-comic text-xl tracking-wider uppercase">Gawaing Pasulat 1</span>
                    </button>

                    <button onclick="changeView('gp2', 'GAWAING PASULAT 2', 'https://drive.google.com/file/d/1p2vH1nkjuepsxphRa5EFLRVFY60qDDrG/preview')" 
                            id="btn-gp2" class="comic-card w-full flex items-center gap-4 p-4 rounded-lg group">
                        <div class="w-12 h-12 bg-yellow-400 border-2 border-comic-border flex items-center justify-center text-2xl transform rotate-3 group-hover:-rotate-12 transition-transform">
                            <i class="fa-solid fa-file-signature text-comic-border"></i>
                        </div>
                        <span class="font-comic text-xl tracking-wider uppercase">Gawaing Pasulat 2</span>
                    </button>

                    <button onclick="changeView('gp3', 'GAWAING PASULAT 3', 'https://drive.google.com/file/d/1I9bxJEfq86vAvzOcOe2BTfpNnYUhO8Ws/preview')" 
                            id="btn-gp3" class="comic-card w-full flex items-center gap-4 p-4 rounded-lg group">
                        <div class="w-12 h-12 bg-yellow-400 border-2 border-comic-border flex items-center justify-center text-2xl transform -rotate-12 group-hover:rotate-6 transition-transform">
                            <i class="fa-solid fa-spell-check text-comic-border"></i>
                        </div>
                        <span class="font-comic text-xl tracking-wider uppercase">Gawaing Pasulat 3</span>
                    </button>

                    <div class="pt-6">
                        <button onclick="changeView('final', 'PANGWAKAS NA PAGSUSULIT', 'https://drive.google.com/file/d/13dMkaukF0wVSIPQn2B0gUyR3HLovgfoT/preview')" 
                                id="btn-final" class="comic-card w-full bg-yellow-400 flex items-center gap-4 p-5 rounded-lg group border-4 border-comic-border">
                            <div class="w-14 h-14 bg-comic-turquoise border-2 border-white flex items-center justify-center text-3xl transform rotate-12 group-hover:scale-110 transition-transform">
                                <i class="fa-solid fa-trophy text-white"></i>
                            </div>
                            <span class="font-comic text-xl tracking-widest text-comic-border uppercase italic">Pangwakas na Pagsusulit</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Main Viewer -->
            <div class="lg:col-span-8">
                <div id="empty-state" class="panel-container h-[700px] flex flex-col items-center justify-center p-10 text-center transform rotate-1 bg-white">
                    <div class="mb-6 relative">
                        <i class="fa-solid fa-burst text-9xl text-yellow-100"></i>
                        <i class="fa-solid fa-book-open text-6xl text-comic-turquoise absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></i>
                    </div>
                    <h2 class="font-comic text-4xl text-comic-border uppercase">Handa ka na ba?</h2>
                    <p class="font-action text-2xl text-gray-400 mt-4 tracking-widest">PUMILI NG ISANG DOKUMENTO UPANG MAGSIMULA!</p>
                </div>

                <div id="viewer-container" class="hidden panel-container flex flex-col h-[800px] transform rotate-1">
                    <div class="bg-comic-border px-6 py-4 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full bg-red-500 border border-white"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500 border border-white"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500 border border-white"></div>
                            <h2 id="current-title" class="font-action text-2xl text-white tracking-widest ml-4 uppercase"></h2>
                        </div>
                        <button onclick="closeViewer()" class="text-white hover:text-red-400 text-2xl transition-colors">
                            <i class="fa-solid fa-circle-xmark"></i>
                        </button>
                    </div>
                    <div class="flex-grow bg-gray-200">
                        <iframe id="main-iframe" src="" class="w-full h-full border-none"></iframe>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function changeView(id, title, url) {
            document.querySelectorAll('.comic-card').forEach(card => card.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');

            document.getElementById('empty-state').classList.add('hidden');
            const container = document.getElementById('viewer-container');
            container.classList.remove('hidden');

            document.getElementById('current-title').innerText = title;
            document.getElementById('main-iframe').src = url;

            if (window.innerWidth < 1024) {
                container.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function closeViewer() {
            document.getElementById('viewer-container').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            document.querySelectorAll('.comic-card').forEach(card => card.classList.remove('active'));
        }
    </script>
</body>
</html>
